services:
  connect-org-web:
    build: .
    container_name: connect-org-web
    ports:
      - "3000:3000"
    environment:
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      # Reaches connect-org-core via the shared Docker network
      ORG_API_URL: http://connect-org-core:8081
      ADMIN_EMAILS: ${ADMIN_EMAILS}
    networks:
      - connect_proxy_network

networks:
  connect_proxy_network:
    external: true
    name: connect-network
